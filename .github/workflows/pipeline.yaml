name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      allow_deploy:
        description: "Override security gate? (true/false)"
        required: false
        default: "false"

jobs:

  sast:
    runs-on: ubuntu-latest
    outputs:
      has_vulns: ${{ steps.check.outputs.has_vulns }}

    steps:
      - uses: actions/checkout@v3

      - name: Install tools
        run: |
          pip install bandit
          sudo apt-get update && sudo apt-get install -y jq

      - name: Run Bandit
        run: |
          bandit -r app -f json -o report.json || true

      - name: Check vulnerabilities
        id: check
        run: |
          if jq -e '.results[] | select(.issue_severity=="HIGH" or .issue_severity=="MEDIUM")' report.json > /dev/null; then
            echo "has_vulns=true" >> $GITHUB_OUTPUT
            echo "❌ Vulnerabilities found"
          else
            echo "has_vulns=false" >> $GITHUB_OUTPUT
            echo "✅ Clean"
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: sast
    if: |
      needs.sast.outputs.has_vulns == 'false' ||
      github.event.inputs.allow_deploy == 'true'

    steps:
      - uses: actions/checkout@v3

      - name: Deploy
        run: |
          echo "🚀 Deploying..."
