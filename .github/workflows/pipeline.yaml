name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  sast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          pip install bandit
          sudo apt-get update && sudo apt-get install -y jq

      - name: Run SAST (Bandit)
        run: |
          bandit -r app -f json -o report.json || true

      - name: Show report (pretty)
        run: |
          echo "========== RAW REPORT =========="
          cat report.json
          echo "================================"

          echo "========== PARSED =========="
          jq '.results[] | {severity: .issue_severity, rule: .test_id, issue: .issue_text}' report.json
          echo "================================"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: report.json

      - name: Security Gate (MEDIUM + HIGH)
        run: |
          if jq -e '.results[] | select(.issue_severity=="HIGH" or .issue_severity=="MEDIUM")' report.json > /dev/null; then
            echo "❌ Vulnerabilities (MEDIUM/HIGH) found!"
            exit 1
          else
            echo "✅ No MEDIUM/HIGH vulnerabilities"
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: sast

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t myapp .

      - name: Run container
        run: |
          docker stop myapp || true
          docker rm myapp || true
          docker run -d -p 8000:8000 --name myapp myapp
