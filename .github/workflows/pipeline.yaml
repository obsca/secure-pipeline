name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      allow_deploy:
        description: "Override security gate? (true/false)"
        required: false
        default: "false"

jobs:

  sast:
    runs-on: ubuntu-latest
    outputs:
      has_vulns: ${{ steps.check.outputs.has_vulns }}

    steps:
      - uses: actions/checkout@v3

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: semgrep --config=auto --json -o semgrep.json || true

  deploy:
    runs-on: ubuntu-latest
    needs: sast
    if: |
      needs.sast.outputs.has_vulns == 'false' ||
      github.event.inputs.allow_deploy == 'true'

    steps:
      - uses: actions/checkout@v3

      - name: Deploy
        run: |
          echo "🚀 Deploying..."
