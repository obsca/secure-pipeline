name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

  workflow_dispatch:
    inputs:
      allow_deploy:
        description: "Override security gate? (true/false)"
        required: false
        default: "false"

jobs:
  sast:
    runs-on: ubuntu-latest

    outputs:
      has_vulns: ${{ steps.check.outputs.has_vulns }}

    steps:
      - uses: actions/checkout@v3

      - name: Install Semgrep
        run: pip install semgrep jq

      - name: Run Semgrep
        run: |
          semgrep --config=auto --json -o semgrep.json || true

      - name: Show results (optional)
        run: cat semgrep.json

      - name: Check vulnerabilities
        id: check
        run: |
          if jq -e '.results[] | select(.extra.severity=="ERROR" or .extra.severity=="WARNING")' semgrep.json > /dev/null; then
            echo "has_vulns=true" >> $GITHUB_OUTPUT
            echo "❌ Vulnerabilities found"
          else
            echo "has_vulns=false" >> $GITHUB_OUTPUT
            echo "✅ Clean"
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: sast

    if: |
      needs.sast.outputs.has_vulns == 'false' ||
      github.event.inputs.allow_deploy == 'true'

    steps:
      - uses: actions/checkout@v3

      - name: Deploy
        run: echo "🚀 Deploying..."
