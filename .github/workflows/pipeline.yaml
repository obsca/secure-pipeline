name: Full DevSecOps CI/CD Pipeline

on:
  push:
    branches: ["main"]

  workflow_dispatch:
    inputs:
      allow_deploy:
        description: "Override security gate (true/false)"
        required: false
        default: "false"

jobs:

  sast:
    runs-on: ubuntu-latest

    outputs:
      sast_failed: ${{ steps.sast_check.outputs.sast_failed }}

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          pip install semgrep bandit jq

      - name: Run Semgrep SAST
        run: |
          semgrep --config=auto --json -o semgrep.json || true

      
      - name: Run Bandit SAST
        run: |
          bandit -r app -f json -o bandit.json || true

      
      - name: Evaluate SAST results
        id: sast_check
        run: |
          SEMGREP_ISSUES=$(jq '.results | length' semgrep.json)
          BANDIT_ISSUES=$(jq '.results | length' bandit.json)

          echo "Semgrep issues: $SEMGREP_ISSUES"
          echo "Bandit issues: $BANDIT_ISSUES"

          TOTAL=$((SEMGREP_ISSUES + BANDIT_ISSUES))

          if [ "$TOTAL" -gt 0 ]; then
            echo "sast_failed=true" >> $GITHUB_OUTPUT
            echo "❌ SAST FAILED"
            exit 1
          else
            echo "sast_failed=false" >> $GITHUB_OUTPUT
            echo "✅ SAST CLEAN"
          fi

  secrets:
    runs-on: ubuntu-latest

    outputs:
      secrets_failed: ${{ steps.check.outputs.secrets_failed }}

    steps:
      - uses: actions/checkout@v3

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true

      - name: Evaluate secrets scan
        id: check
        run: |
          if [ $? -ne 0 ]; then
            echo "secrets_failed=true" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "secrets_failed=false" >> $GITHUB_OUTPUT
          fi

  deps:
    runs-on: ubuntu-latest

    outputs:
      deps_failed: ${{ steps.check.outputs.deps_failed }}

    steps:
      - uses: actions/checkout@v3

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget

          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.69.3_Linux-64bit.deb

          sudo dpkg -i trivy_0.69.3_Linux-64bit.deb

      - name: Scan dependencies
        run: |
          trivy fs --format json -o trivy.json .

      - name: Evaluate dependencies
        id: check
        run: |
          ISSUES=$(jq '.Results[].Vulnerabilities | length' trivy.json 2>/dev/null || echo 0)

          if [ "$ISSUES" -gt 0 ]; then
            echo "deps_failed=true" >> $GITHUB_OUTPUT
            echo "❌ Dependency vulnerabilities found"
            exit 1
          else
            echo "deps_failed=false" >> $GITHUB_OUTPUT
            echo "✅ Dependencies clean"
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: [sast, secrets, deps]

    if: |
      github.event.inputs.allow_deploy == 'true' ||
      (needs.sast.result == 'success' &&
       needs.secrets.result == 'success' &&
       needs.deps.result == 'success')

    steps:
      - uses: actions/checkout@v3

      - name: Deploy application
        run: |
          echo "🚀 ALL SECURITY CHECKS PASSED"
          echo "Deploying to production..."
